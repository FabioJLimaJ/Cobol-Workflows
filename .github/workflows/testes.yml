name: Cobol testes

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol

      
      - name: Compilar
        run: cobc -x testes.cbl main.cbl -o testes
      
      - name: Rodar testes
        run: |
          ./testes 

















  
