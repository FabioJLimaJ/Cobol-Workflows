name: Cobol testes

on:
  push:
    branches: [ "main" ]

jobs:
  # TRABALHO 1: Testar o código COBOL
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol

      # Alterado aqui para validar o arquivo correto
      - name: Syntax Check main.cbl
        run: cobc -fsyntax-only main.cbl

  # TRABALHO 2: Criar a imagem e mandar para o Docker Hub
  deploy:
    runs-on: ubuntu-latest
    needs: test # Só roda se o passo 'test' passar!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Esse passo vai ler automaticamente o seu Dockerfile atualizado com o Ubuntu 22.04 e o main.cbl
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/main:latest